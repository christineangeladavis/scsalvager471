# Posts changelog updates to Discord #releases when README.md is pushed to
# main. Two cases handled:
#
#   1. Top "UPDATE" header is *new* vs. the previous commit:
#      → post the entire top changelog block (full release announcement).
#
#   2. Top "UPDATE" header is unchanged but new bullets were appended under
#      it: → post just the new bullets, prefixed with "**vX.Y update:**".
#
#   3. Neither: skip (e.g. README typo fix).
#
# Never tags @everyone — allowed_mentions.parse is locked to []. For
# everyone-pings use the manual post-message.yml workflow.
#
# Required GitHub repo secret:
#   DISCORD_BOT_TOKEN — same bot token used by the Vercel app
#                       (Settings → Secrets and variables → Actions)
#
# Channel ID is hard-coded below (DISCORD_RELEASES_CHANNEL_ID); channel IDs
# are public identifiers, not secrets.
#
# Bot must be a member of the server with Send Messages in #releases.

name: Announce release to Discord

on:
  push:
    branches: [main]
    paths:
      - README.md
  workflow_dispatch:

env:
  DISCORD_RELEASES_CHANNEL_ID: "1497542109526233188"

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changelog update and build message
        id: changelog
        run: |
          set -euo pipefail

          # extract_top_block <file-content-on-stdin>
          # Prints lines from the first "UPDATE " header up to (but not
          # including) the next "UPDATE " header, stripped of trailing blanks.
          extract_top_block() {
            awk '
              /^UPDATE /{ c++; if (c > 1) exit }
              c == 1 { lines[++n] = $0 }
              END {
                while (n > 0 && lines[n] == "") n--
                for (i = 1; i <= n; i++) print lines[i]
              }
            '
          }

          current_block=$(cat README.md | extract_top_block)
          if [ -z "$current_block" ]; then
            echo "No UPDATE header in README.md — nothing to announce."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          current_header=$(printf '%s\n' "$current_block" | head -1)

          prev_block=$(git show HEAD~1:README.md 2>/dev/null | extract_top_block || true)
          prev_header=$(printf '%s\n' "$prev_block" | head -1 || true)

          # Determine what to post.
          if [ "$current_header" != "$prev_header" ]; then
            # Case 1: new version → post the full block, header bolded.
            body=$(printf '%s\n' "$current_block" | tail -n +2)
            message=$(printf '**%s**\n%s' "$current_header" "$body")
            kind="full-block"
          else
            # Case 2/3: same header — find newly-added lines.
            # Pure awk avoids `diff`'s "exit 1 when files differ" tripping
            # set -e + pipefail; load prev into a set, print current's lines
            # that aren't in it (preserves order, dedupes by content).
            new_lines=$(awk '
              NR == FNR { prev[$0] = 1; next }
              !($0 in prev)
            ' <(printf '%s\n' "$prev_block") <(printf '%s\n' "$current_block"))
            if [ -z "$new_lines" ]; then
              echo "No new changelog content under $current_header — skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Extract just "vX.Y" from the header for a tight prefix.
            version=$(printf '%s' "$current_header" | grep -oE 'v[0-9]+(\.[0-9]+)*' | head -1 || echo "release")
            message=$(printf '**%s update:**\n%s' "$version" "$new_lines")
            kind="appended-bullets"
          fi

          {
            echo "skip=false"
            echo "kind=$kind"
            echo "message<<MESSAGE_EOF"
            echo "$message"
            echo "MESSAGE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Discord #releases
        if: steps.changelog.outputs.skip != 'true'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          MESSAGE: ${{ steps.changelog.outputs.message }}
          KIND: ${{ steps.changelog.outputs.kind }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_BOT_TOKEN:-}" ]; then
            echo "::warning::Missing DISCORD_BOT_TOKEN secret — skipping."
            exit 0
          fi

          # Discord caps message content at 2000 chars.
          formatted="$MESSAGE"
          if [ ${#formatted} -gt 1990 ]; then
            formatted="${formatted:0:1987}..."
          fi

          # allowed_mentions.parse=[] guarantees no pings even if the bullet
          # text mentions @everyone, @here, or a role/user.
          payload=$(jq -n --arg content "$formatted" '{
            content: $content,
            allowed_mentions: { parse: [] }
          }')

          http_status=$(curl -sS -o /tmp/discord_resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -H "User-Agent: scsalvager-release-announcer (+https://scsalvager.net)" \
            -d "$payload" \
            "https://discord.com/api/v10/channels/$DISCORD_RELEASES_CHANNEL_ID/messages")

          if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ]; then
            echo "Posted ($KIND) to #releases."
          else
            echo "::error::Discord rejected announce (HTTP $http_status)"
            cat /tmp/discord_resp.json
            exit 1
          fi
