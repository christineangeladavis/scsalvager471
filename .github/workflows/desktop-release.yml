name: Desktop release build

on:
  push:
    tags:
      # Publish a desktop release by pushing a tag like
      # `desktop-v0.2.0`. The Tauri Cargo.toml + tauri.conf.json
      # versions should match the tag's numeric portion before
      # pushing.
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish under (e.g. desktop-v0.2.0). Required for manual runs."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x86_64
            rust-target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: darwin-aarch64
            rust-target: aarch64-apple-darwin
          - os: ubuntu-24.04
            target: linux-x86_64
            rust-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libpipewire-0.3-dev \
            libxdo-dev \
            libgbm-dev \
            libdrm-dev \
            libwayland-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          key: ${{ matrix.target }}
          # Skip cache save on Windows. Swatinem/rust-cache's
          # post-job tar.exe + zstd dance through Git's bundled
          # tar.exe is flaky on Windows runners (the Cargo cache
          # tarball trips on long target/ paths and the post-step
          # exits non-zero). Cache RESTORE still runs — Linux +
          # macOS save normally, Windows just does a cold build
          # every release. Trade ~3 min on Windows builds for a
          # green workflow.
          save-if: ${{ runner.os != 'Windows' }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install npm deps
        working-directory: desktop
        run: npm install

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + sign + publish via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          # Updater signing — only effective when the operator has
          # populated these secrets via repo settings. Without them
          # tauri-action skips the signature step and the manifest
          # endpoint won't surface the build to the running app
          # (no .sig sibling to ship).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # Windows Authenticode + macOS notarization env vars
          # are intentionally NOT pre-wired here. tauri-action
          # interprets a defined-but-empty env var as "try to
          # sign, then fail" — which crashed the macOS build with
          # `security import: SecKeychainItemImport: One or more
          # parameters... not valid` because no Apple cert exists
          # in repo secrets yet.
          #
          # When the operator wants signed builds, paste the
          # appropriate block back into this env section after
          # populating the matching repo secrets:
          #
          # Windows (instant SmartScreen pass with EV cert):
          #   WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          #   WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          #
          # macOS (instant Gatekeeper pass with Apple Dev ID):
          #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          #   APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: "SCSalvager Desktop ${{ steps.tag.outputs.tag }}"
          releaseBody: |
            Auto-generated build from `${{ steps.tag.outputs.tag }}`.
            See README.md / What's New modal on scsalvager.net for the
            human changelog. Installers are signed with the SCSalvager
            updater key; the running app polls
            /api/desktop/manifest and offers the update on next launch.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.rust-target == 'aarch64-apple-darwin' && '--target aarch64-apple-darwin' || (matrix.rust-target == 'x86_64-apple-darwin' && '--target x86_64-apple-darwin' || '') }}

      # Rename uploaded release assets so the OS label sits in
      # every filename. Tauri's default bundle names only carry
      # the architecture (x64 / aarch64 / amd64); operators and
      # downloaders want the OS visible too. Rename matches each
      # OS's specific bundle extensions so other matrix runners
      # don't get their assets touched. .sig siblings are
      # renamed in lockstep with the installer they sign.
      - name: Rename release assets to include OS label
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          TAG="${{ steps.tag.outputs.tag }}"
          OS_LABEL="${{ matrix.target }}"
          REPO="${{ github.repository }}"
          REL_ID=$(gh api "repos/$REPO/releases/tags/$TAG" --jq '.id')

          case "$OS_LABEL" in
            windows-*) EXT_RE='(\.msi|\.msi\.zip|-setup\.exe|-setup\.nsis\.zip)(\.sig)?$' ;;
            darwin-*)  EXT_RE='(\.dmg|\.app\.tar\.gz)(\.sig)?$' ;;
            linux-*)   EXT_RE='(\.AppImage|\.AppImage\.tar\.gz|\.deb)(\.sig)?$' ;;
            *)         EXT_RE='__never_match__' ;;
          esac

          gh api "repos/$REPO/releases/$REL_ID/assets" --paginate \
            --jq '.[] | "\(.id)|\(.name)"' \
            | while IFS='|' read -r ASSET_ID ASSET_NAME; do
                # Skip if already prefixed with this OS label.
                if [[ "$ASSET_NAME" == *"-${OS_LABEL}_"* ]]; then continue; fi
                # Skip files that don't belong to this OS.
                if ! [[ "$ASSET_NAME" =~ $EXT_RE ]]; then continue; fi
                # Insert the OS label after the first product-name
                # token, before the underscore that prefixes the
                # version. SCSalvager_0.1.0_x64.msi becomes
                # SCSalvager-windows-x86_64_0.1.0_x64.msi.
                NEW_NAME="${ASSET_NAME%%_*}-${OS_LABEL}_${ASSET_NAME#*_}"
                echo "Rename: $ASSET_NAME -> $NEW_NAME"
                gh api -X PATCH "repos/$REPO/releases/assets/$ASSET_ID" \
                  --field name="$NEW_NAME" >/dev/null
              done
