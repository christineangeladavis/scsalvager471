name: Desktop release build

on:
  push:
    tags:
      # Publish a desktop release by pushing a tag like
      # `desktop-v0.2.0`. The Tauri Cargo.toml + tauri.conf.json
      # versions should match the tag's numeric portion before
      # pushing.
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish under (e.g. desktop-v0.2.0). Required for manual runs."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x86_64
            rust-target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: darwin-aarch64
            rust-target: aarch64-apple-darwin
          - os: ubuntu-24.04
            target: linux-x86_64
            rust-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libpipewire-0.3-dev \
            libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install npm deps
        working-directory: desktop
        run: npm install

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + sign + publish via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          # Updater signing — only effective when the operator has
          # populated these secrets via repo settings. Without them
          # tauri-action skips the signature step and the manifest
          # endpoint won't surface the build to the running app
          # (no .sig sibling to ship).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: "SCSalvager Desktop ${{ steps.tag.outputs.tag }}"
          releaseBody: |
            Auto-generated build from `${{ steps.tag.outputs.tag }}`.
            See README.md / What's New modal on scsalvager.net for the
            human changelog. Installers are signed with the SCSalvager
            updater key; the running app polls
            /api/desktop/manifest and offers the update on next launch.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.rust-target == 'aarch64-apple-darwin' && '--target aarch64-apple-darwin' || (matrix.rust-target == 'x86_64-apple-darwin' && '--target x86_64-apple-darwin' || '') }}
