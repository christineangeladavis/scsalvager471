name: Desktop release build

on:
  push:
    tags:
      # Publish a desktop release by pushing a tag like
      # `desktop-v0.2.0`. The Tauri Cargo.toml + tauri.conf.json
      # versions should match the tag's numeric portion before
      # pushing.
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish under (e.g. desktop-v0.2.0). Required for manual runs."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x86_64
            rust-target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: darwin-aarch64
            rust-target: aarch64-apple-darwin
          - os: ubuntu-24.04
            target: linux-x86_64
            rust-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libpipewire-0.3-dev \
            libxdo-dev \
            libgbm-dev \
            libdrm-dev \
            libwayland-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          key: ${{ matrix.target }}
          # Skip cache save on Windows. Swatinem/rust-cache's
          # post-job tar.exe + zstd dance through Git's bundled
          # tar.exe is flaky on Windows runners (the Cargo cache
          # tarball trips on long target/ paths and the post-step
          # exits non-zero). Cache RESTORE still runs — Linux +
          # macOS save normally, Windows just does a cold build
          # every release. Trade ~3 min on Windows builds for a
          # green workflow.
          save-if: ${{ runner.os != 'Windows' }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install npm deps
        working-directory: desktop
        run: npm install

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      # Build + sign bundles directly via the Tauri CLI. We used to
      # use tauri-apps/tauri-action@v0 here, but its built-in
      # post-bundle processing dropped the Tauri 2 updater
      # archives (.nsis.zip / .msi.zip / .app.tar.gz /
      # .AppImage.tar.gz) from disk after building — even when
      # `tagName: ""` was passed to disable its publish path. We
      # invoke the CLI directly so the full bundle output stays on
      # disk for the upload step below.
      - name: Build + sign bundles
        shell: bash
        working-directory: desktop
        env:
          # Updater signing — only effective when the operator has
          # populated these secrets via repo settings. Without them
          # tauri build skips the signature step and the manifest
          # endpoint won't surface the build to the running app
          # (no .sig sibling to ship).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows Authenticode + macOS notarization env vars are
          # intentionally NOT pre-wired here. When the operator
          # wants signed builds, add them after populating the
          # matching repo secrets:
          #   WINDOWS_CERTIFICATE / _PASSWORD
          #   APPLE_CERTIFICATE / _PASSWORD / _SIGNING_IDENTITY /
          #     APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
        run: |
          set -e
          TARGET="${{ matrix.rust-target }}"
          case "$TARGET" in
            *apple-darwin) npx tauri build --target "$TARGET" ;;
            *)             npx tauri build ;;
          esac

      # Create the GitHub release on the first matrix runner that
      # gets here. `gh release create` errors with "release already
      # exists" on the 2nd + 3rd runners — swallow that and treat
      # it as success so the upload step can proceed.
      - name: Ensure GitHub release exists
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          OUT=$(gh release create "$TAG" \
            --repo "$REPO" \
            --title "SCSalvager Desktop $TAG" \
            --notes "Auto-generated build from \`$TAG\`. See README.md / What's New modal on scsalvager.net for the human changelog. Installers are signed with the SCSalvager updater key; the running app polls /api/desktop/manifest and offers the update on next launch." \
            2>&1)
          STATUS=$?
          echo "$OUT"
          if [ $STATUS -ne 0 ] && ! echo "$OUT" | grep -qi "already exists"; then
            exit $STATUS
          fi
          exit 0

      # Upload every artifact in the bundle output directory —
      # raw installers (.exe / .msi / .dmg / .deb / .AppImage),
      # Tauri 2 updater archives (.nsis.zip / .msi.zip /
      # .app.tar.gz / .AppImage.tar.gz), and their .sig siblings.
      # `--clobber` overwrites an existing same-name asset (handy
      # for tag re-runs).
      - name: Upload bundle artifacts to release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          OS_LABEL="${{ matrix.target }}"
          RUST_TARGET="${{ matrix.rust-target }}"

          # macOS uses target-specific bundle path when --target is
          # passed; other platforms use the default release/bundle.
          case "$OS_LABEL" in
            darwin-*) BUNDLE_DIR="desktop/src-tauri/target/${RUST_TARGET}/release/bundle" ;;
            *)        BUNDLE_DIR="desktop/src-tauri/target/release/bundle" ;;
          esac

          echo "Scanning $BUNDLE_DIR for upload candidates..."
          # Collect every installer + updater archive + .sig file
          # under bundle/. macOS GHA runners ship bash 3.2 (no
          # `mapfile` builtin) so we read into the array with a
          # portable while-loop instead.
          FILES=()
          while IFS= read -r f; do
            FILES+=("$f")
          done < <(find "$BUNDLE_DIR" -type f \( \
            -name "*.msi" -o -name "*.msi.sig" -o \
            -name "*.msi.zip" -o -name "*.msi.zip.sig" -o \
            -name "*-setup.exe" -o -name "*-setup.exe.sig" -o \
            -name "*-setup.nsis.zip" -o -name "*-setup.nsis.zip.sig" -o \
            -name "*.dmg" -o -name "*.dmg.sig" -o \
            -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" -o \
            -name "*.AppImage" -o -name "*.AppImage.sig" -o \
            -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" -o \
            -name "*.deb" -o -name "*.deb.sig" \
            \))

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No bundle artifacts found in $BUNDLE_DIR"
            exit 1
          fi

          # Tauri 2 emits the macOS updater archive as plain
          # `SCSalvager.app.tar.gz` (+ .sig) with no version or
          # arch token. The rename step below parses
          # `<product>_<version>_<arch><suffix>` and would mangle
          # that name, so we copy these files to a versioned name
          # in a staging dir before upload.
          STAGE_DIR="$RUNNER_TEMP/upload-stage"
          mkdir -p "$STAGE_DIR"
          STAGED=()
          VERSION_NUM="${TAG#desktop-v}"
          for f in "${FILES[@]}"; do
            BASENAME=$(basename "$f")
            case "$BASENAME" in
              SCSalvager.app.tar.gz|SCSalvager.app.tar.gz.sig)
                # macOS only — rebuild canonical pattern.
                TAIL="${BASENAME#SCSalvager}"  # ".app.tar.gz" or ".app.tar.gz.sig"
                NEW="SCSalvager_${VERSION_NUM}_aarch64${TAIL}"
                cp "$f" "$STAGE_DIR/$NEW"
                STAGED+=("$STAGE_DIR/$NEW")
                ;;
              *)
                STAGED+=("$f")
                ;;
            esac
          done

          echo "Uploading ${#STAGED[@]} files:"
          for f in "${STAGED[@]}"; do echo "  $f"; done
          gh release upload "$TAG" "${STAGED[@]}" --repo "$REPO" --clobber

      # Rename uploaded release assets into the canonical pattern:
      #   SCSalvager-Desktop-<os-label>_v<version><suffix>
      # where <os-label> is the matrix target (e.g. windows-x86_64)
      # and <suffix> preserves the trailing locale + "-setup" + ext
      # tokens that Tauri's bundler emits after the arch. Examples:
      #   SCSalvager_0.2.7_x64-setup.exe       ->
      #     SCSalvager-Desktop-windows-x86_64_v0.2.7-setup.exe
      #   SCSalvager_0.2.7_x64_en-US.msi       ->
      #     SCSalvager-Desktop-windows-x86_64_v0.2.7_en-US.msi
      #   SCSalvager_0.2.7_aarch64.dmg         ->
      #     SCSalvager-Desktop-darwin-aarch64_v0.2.7.dmg
      #   SCSalvager_0.2.7_amd64.AppImage      ->
      #     SCSalvager-Desktop-linux-x86_64_v0.2.7.AppImage
      #   SCSalvager_0.2.7_amd64.deb           ->
      #     SCSalvager-Desktop-linux-x86_64_v0.2.7.deb
      # .sig siblings are renamed in lockstep with the installer
      # they sign. Each matrix runner skips files that don't match
      # its OS so the others don't get touched.
      - name: Rename release assets to canonical Desktop naming
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          TAG="${{ steps.tag.outputs.tag }}"
          OS_LABEL="${{ matrix.target }}"
          REPO="${{ github.repository }}"
          REL_ID=$(gh api "repos/$REPO/releases/tags/$TAG" --jq '.id')

          case "$OS_LABEL" in
            windows-*) EXT_RE='(\.msi|\.msi\.zip|-setup\.exe|-setup\.nsis\.zip)(\.sig)?$' ;;
            darwin-*)  EXT_RE='(\.dmg|\.app\.tar\.gz)(\.sig)?$' ;;
            linux-*)   EXT_RE='(\.AppImage|\.AppImage\.tar\.gz|\.deb)(\.sig)?$' ;;
            *)         EXT_RE='__never_match__' ;;
          esac

          # Snapshot existing asset names so the loop can detect a
          # rename-target collision (re-runs of the same tag leave
          # the previously-renamed asset on the release; PATCH 422s
          # on duplicate name).
          EXISTING_NAMES=$(gh api "repos/$REPO/releases/$REL_ID/assets" --paginate --jq '.[].name')

          gh api "repos/$REPO/releases/$REL_ID/assets" --paginate \
            --jq '.[] | "\(.id)|\(.name)"' \
            | while IFS='|' read -r ASSET_ID ASSET_NAME; do
                # Skip if already in canonical form.
                if [[ "$ASSET_NAME" == SCSalvager-Desktop-* ]]; then continue; fi
                # Skip files that don't belong to this OS.
                if ! [[ "$ASSET_NAME" =~ $EXT_RE ]]; then continue; fi
                # Parse the Tauri-default name:
                #   <product>_<version>_<arch><suffix>
                # version = first \d+\.\d+\.\d+ run after first "_".
                # SUFFIX = whatever follows the arch token (e.g.
                # "-setup.exe", "_en-US.msi", ".dmg") and includes
                # any ".sig" tail.
                AFTER_PRODUCT="${ASSET_NAME#*_}"            # "0.2.7_x64-setup.exe"
                VERSION="${AFTER_PRODUCT%%_*}"             # "0.2.7"
                AFTER_VERSION="${AFTER_PRODUCT#*_}"        # "x64-setup.exe"
                # Strip the arch token (x86_64 must come before
                # x64 in the alternation since the longer wins).
                SUFFIX=$(echo "$AFTER_VERSION" | sed -E 's/^(x86_64|aarch64|amd64|x64)//')
                NEW_NAME="SCSalvager-Desktop-${OS_LABEL}_v${VERSION}${SUFFIX}"
                if grep -Fxq "$NEW_NAME" <<< "$EXISTING_NAMES"; then
                  echo "Skip: $NEW_NAME already on release (likely a tag re-run)"
                  continue
                fi
                echo "Rename: $ASSET_NAME -> $NEW_NAME"
                gh api -X PATCH "repos/$REPO/releases/assets/$ASSET_ID" \
                  --field name="$NEW_NAME" >/dev/null
              done
