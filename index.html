    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #000; color: #f1f5f9; font-family: ui-sans-serif, system-ui, sans-serif; }

      /* Site-wide scrollbar styling — matches the Patch History
         scrollbar (cyan-500/70 thumb, slate-950 track, both pill-
         shaped). Applied to every scrollable element so the page
         body, modals, tables, and ad-hoc overflow containers all
         look the same. Per-element Tailwind variants in App.jsx
         that target ::-webkit-scrollbar still work — they layer
         the same colors on top of these defaults without
         conflict. */
      html { scrollbar-width: thin; scrollbar-color: rgb(6 182 212 / 0.7) rgb(2 6 23); }
      *   { scrollbar-width: thin; scrollbar-color: rgb(6 182 212 / 0.7) rgb(2 6 23); }
      ::-webkit-scrollbar        { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track  { background: rgb(2 6 23); border-radius: 9999px; }
      ::-webkit-scrollbar-thumb  { background: rgb(6 182 212 / 0.7); border-radius: 9999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgb(34 211 238); }
      ::-webkit-scrollbar-corner { background: rgb(2 6 23); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
